<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>স্কুল ম্যানেজমেন্ট সিস্টেম</title>
    <link href="https://fonts.googleapis.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 97vh; /* মোবাইলের জন্য ভিউপোর্ট হাইট ফিক্সড করা হলো */
            width: 97vw;
            overflow: hidden;
            background-color: #0f172a;
        }
        
        .main-container {
            width: 97%;
            height: 97%;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            position: absolute;
            top: -50px;
            left: 0;
            width: 97%;
            height: calc(97% + 50px); 
            border: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <iframe src="https://script.google.com/macros/s/AKfycbzb0uUnNpaPeVljVMOCy8H0MIE3qlgli7O4oilnQf0vNtpSo56-5QjQsI2EwJYZahFzVw/exec"></iframe>
    </div>

</body>
</html>
