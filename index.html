<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>মানিকপীর হাফেজিয়া মাদ্রাসা - ড্যাশবোর্ড</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background-color: #0f172a;
            /* মোবাইলের স্ক্রলিং বাঘ দূর করার জন্য নিচের লাইনগুলো যোগ করা হয়েছে */
            -webkit-overflow-scrolling: touch;
        }
        
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: -55px; /* ব্যানার লুকানোর ট্রিক */
            left: 0;
            width: 100%;
            height: calc(100% + 55px); 
            border: none;
            
            /* মোবাইল ব্রাউজারকে আইফ্রেমের কন্টেন্ট সঠিকভাবে দেখাতে বাধ্য করার জন্য */
            min-width: 100%;
            *width: 100%;
        }
    </style>
</head>
<body>

    <div class="iframe-wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbx-WTw0z6wRi8Wyhn1yeyaACYBmcfCapA1iMfHmluQz5zVi9u5PDgdAZVz1BM0NX0-knA/exec"></iframe>
    </div>

</body>
</html>
