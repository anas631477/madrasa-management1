<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>স্কুল ম্যানেজমেন্ট সিস্টেম</title>
    <link href="https://fonts.googleapis.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background-color: #0f172a;
            -webkit-overflow-scrolling: touch; /* মোবাইলে স্ক্রলিং স্মুথ করার জন্য */
        }
        
        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: -55px; /* ব্যানার লুকানোর ট্রিক */
            left: 0;
            width: 100%;
            height: calc(100% + 55px); 
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- src এর ভেতর আপনার নতুন জেনারেট হওয়া /exec লিংকটি বসাবেন -->
        <iframe src="https://script.google.com/macros/s/AKfycbzmiZsRECEPxFN2Inri9YPGik1oa6vK87V_WeDOFXS0YUFHf7LrItTflCQ7FX7K7VFHhw/exec" scrolling="yes"></iframe>
    </div>

</body>
</html>
