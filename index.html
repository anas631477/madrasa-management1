<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>মাদ্রাসা ম্যানেজমেন্ট সিস্টেম</title>

    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ZgIsgAfGHmoJuK86BmxUQBIz51vAlFxE" />
    <link href="https://fonts.googleapis.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet" />
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'SolaimanLipi', sans-serif;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        /* 🔒 লগইন/লাইসেন্স ভেরিফিকেশন স্ক্রিনের চমৎকার ডার্ক স্টাইল */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            padding: 20px;
        }
        .login-card {
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #334155;
        }
        .madrasa-logo {
            width: 90px;
            height: 90px;
            margin-bottom: 20px;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.4));
            object-fit: contain;
        }
        .login-card h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: #38bdf8;
        }
        .login-card p {
            margin: 0 0 24px 0;
            color: #94a3b8;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #cbd5e1;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #0284c7;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #0369a1;
        }
        
        /* 📱 মূল অ্যাপ কন্টেইনার (লগইনের পর সোর্স একটিভ হবে) */
        .main-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: none; 
        }
        iframe {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: calc(100% + 30px); 
            border: none;
        }
    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <img src="https://lh3.googleusercontent.com/d/1ZgIsgAfGHmoJuK86BmxUQBIz51vAlFxE" alt="Madrasa Logo" class="madrasa-logo" />
            <h2>লাইসেন্স ভেরিফিকেশন</h2>
            <p>সফটওয়্যারটি ব্যবহার করতে অনুগ্রহ করে ইউজারনেম এবং পাসওয়ার্ড/ লাইসেন্স কি দিন</p>
            
            <div class="input-group">
                <label for="username">ইউজারনেম</label>
                <input type="text" id="username" placeholder="যেমন: manikpir" required />
            </div>
            
            <div class="input-group">
                <label for="licenseKey">লাইসেন্স কি / পাসওয়ার্ড</label>
                <input type="password" id="licenseKey" placeholder="যেমন: manikpir@969" required />
            </div>
            
            <button class="login-btn" id="loginBtn" onclick="validateAndLaunch()">🔑 সক্রিয় করুন</button>
        </div>
    </div>

    <div class="main-container" id="mainAppContainer">
        <iframe id="appIframe" src=""></iframe>
    </div>

    <script>
        // 🎯 আপনার দেওয়া নতুন সিকিউরড গুগল ব্যাকএন্ড লিঙ্ক
        var GAS_URL = "https://script.google.com/macros/s/AKfycbxZGTNP_noyYM2SmSDbhgORtBs4kE-SSWCOU1nrSN6RErJ1NUTvUk9OI476LA93Cf7p3A/exec";

        function validateAndLaunch() {
            var userField = document.getElementById('username').value.trim();
            var keyField  = document.getElementById('licenseKey').value.trim();

            if (!userField || !keyField) {
                alert('অনুগ্রহ করে ইউজারনেম এবং লাইসেন্স কি দুটোই সঠিকভাবে লিখুন।');
                return;
            }

            // 🚀 সিকিউর ইউআরএল জেনারেশন (প্যারামিটার সহ)
            var secureLink = GAS_URL + "?user=" + encodeURIComponent(userField) + "&key=" + encodeURIComponent(keyField);

            // ইন্টারফেস পরিবর্তন
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainAppContainer').style.display = 'block';
            
            // আইফ্রেমের সোর্সে রিকোয়েস্ট পাঠানো হলো
            document.getElementById('appIframe').src = secureLink;
        }

        // কীবোর্ডের এন্টার চাপলে যেন অটো সাবমিট হয়
        document.getElementById('licenseKey').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                validateAndLaunch();
            }
        });
    </script>

    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        document.onkeydown = function(e) {
            if (e.keyCode == 123) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
                return false;
            }
        };
    </script>

</body>
</html>
