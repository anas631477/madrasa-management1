<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- 🎯 ব্রাউজারের ট্যাবের নাম -->
    <title>স্কুল ম্যানেজমেন্ট সিস্টেম</title>

    <!-- 🎯 আপনার গুগল ড্রাইভের লোগোটিকে ডিরেক্ট লিঙ্কে রূপান্তর করে এখানে বসানো হয়েছে -->
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ZgIsgAfGHmoJuK86BmxUQBIz51vAlFxE" />
    
    <link href="https://fonts.googleapis.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh; /* মোবাইলের জন্য ভিউপোর্ট হাইট ফিক্সড করা হলো */
            width: 100vw;
            overflow: hidden;
            background-color: #0f172a;
        }
        
        .main-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: calc(100% + 30px); 
            border: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <iframe src="https://script.google.com/macros/s/AKfycbxgu1dCqJUPrJ_epZl4whCX4prSbddOOf3WPNsCf1ukh3GKJE7F87oqm6gzoXl8rmR16Q/exec"></iframe>
    </div>

</body>
</html>
